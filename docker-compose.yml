services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-manicrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-manicrm}
      POSTGRES_DB: ${POSTGRES_DB:-manicrm}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-manicrm}']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
